name: Publish PyPI

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify tag matches project version
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import tomllib

          tag = os.environ["GITHUB_REF_NAME"]
          version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          expected_tag = f"v{version}"
          if tag != expected_tag:
              raise SystemExit(f"Tag {tag} does not match pyproject.toml version {version}")
          PY

      - name: Install build tools
        run: |
          python -m pip install --upgrade build pytest
          python -m pip install -e .

      - name: Run tests
        run: python -m pytest tests -q

      - name: Build distributions
        run: python -m build

      - name: Verify wheel metadata and import
        run: |
          python -m pip install --force-reinstall dist/*.whl
          python - <<'PY'
          from pathlib import Path
          from importlib.metadata import version
          import tomllib

          from lyra import AsyncLyraClient

          expected_version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          assert version("lyriktrip-lyra-python-sdk") == expected_version
          client = AsyncLyraClient(base_url="https://example.test", api_key="")
          assert hasattr(client, "route_v2")
          PY

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
